apiVersion: apps/v1
kind: Deployment
metadata:
  name: brixta-dashboard
  namespace: default
  labels:
    app: brixta-dashboard
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brixta-dashboard
  template:
    metadata:
      labels:
        app: brixta-dashboard
        component: frontend
    spec:
      containers:
        - name: dashboard
          image: docker.io/goswamirohit/brresearepo-dashboard:v5
          ports:
            - containerPort: 3000
              name: http
          env:
            # Reaches out to the newly internalized gateway service
            - name: PYTHON_BACKEND_URL
              value: "http://gateway-service"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: brixta-dashboard-service
  namespace: default
  labels:
    app: brixta-dashboard
    component: frontend
spec:
  type: NodePort
  selector:
    app: brixta-dashboard
  ports:
    - name: http
      port: 80
      targetPort: 3000
      # Exposed securely over your Tailscale host
      nodePort: 32080