apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: brixta
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nodeport-to-public-services
  namespace: brixta
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [brixta-dashboard, brixta-mcp, minio]
  policyTypes: ["Ingress"]
  ingress:
    # cloudflared runs on the Kubernetes host in this deployment model. The
    # NetworkPolicy therefore permits only the public pods' application ports;
    # the host firewall must restrict NodePorts 30020-30022 to the host itself.
    - ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8001
        - protocol: TCP
          port: 9001
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dashboard-to-gateway
  namespace: brixta
spec:
  podSelector:
    matchLabels:
      app: gateway
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: brixta-dashboard
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: internal-data-services
  namespace: brixta
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [redis, minio]
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: {}
