apiVersion: v1
kind: Service
metadata:
  name: brixta-mcp-service
  namespace: brixta
  labels:
    app: brixta-mcp
spec:
  # The host-managed Cloudflare Tunnel connects to this NodePort.
  type: NodePort
  selector:
    app: brixta-mcp
  ports:
    - name: mcp-http
      port: 80
      targetPort: 8001
      nodePort: 30021
