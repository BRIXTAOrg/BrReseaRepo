services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: brixta
      POSTGRES_USER: brixta
      POSTGRES_PASSWORD: brixta
    ports:
      - "5432:5432"
    volumes:
      - brixta-postgres:/var/lib/postgresql/data
      - ./infra/postgres-init.sql:/docker-entrypoint-initdb.d/00-brixta.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brixta -d brixta"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: change-this-local-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - brixta-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 minioadmin change-this-local-password
        && mc mb --ignore-existing local/brixta

volumes:
  brixta-postgres:
  brixta-minio:
